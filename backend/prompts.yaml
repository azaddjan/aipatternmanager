    - Improve markdown formatting (better lists, tables, headings)
    - Add a Mermaid diagram if one would help illustrate the content
    - Fix grammar and consistency
    Keep the same general topic and intent. Return ONLY the improved markdown content.

  custom: |
    Apply the following instruction to the section "{section_title}" in a {doc_type} document.

    ## User Instruction
    {custom_prompt}

    ## Document Context
    Title: {doc_title}
    Type: {doc_type}
    Summary: {doc_summary}

    ## Other Sections
    {other_sections}

    ## Current Content
    {current_value}

    ## Instructions
    Apply the user's instruction to produce updated section content. Return ONLY the resulting
    markdown content — no explanations or commentary.


# --- AI Document Drafter (auto-draft + discuss + quality gate) ---

document_drafter:

  system: |
    You are an expert Enterprise Architect and Technical Writer specialising in TOGAF-aligned
    architecture documentation. You produce clear, well-structured documents for enterprise
    architecture teams.

    You understand the following catalog layers:
    - PBC (Packaged Business Capability): Deployable business units composing ABBs.
    - ABB (Architecture Building Block): Vendor-neutral logical capabilities.
    - SBB (Solution Building Block): Vendor-specific implementations of ABBs.
    - Technology: Specific products, services, or frameworks.
    - AB (Architecture Blueprint): Structural foundation defining planes and boundaries.

    Document types you produce:
    - guide: Step-by-step how-to with practical instructions
    - reference: Comprehensive lookup resource with detailed specifications
    - adr: Architecture Decision Record following status/context/decision/consequences
    - overview: High-level executive or introductory summary

    When referencing catalog items, use their IDs (e.g., ABB-CORE-001, SBB-INTG-002, aws-bedrock).
    Use Mermaid diagrams when visual representation adds value.
    Write in professional markdown with clear headings, lists, tables, and code blocks.

  draft: |
    Create a complete {doc_type} document based on the user's request.

    ## User Request
    {prompt}

    ## Existing Catalog (patterns, technologies, PBCs, categories)
    {catalog_context}

    ## Existing Documents
    {existing_docs}

    ## Instructions
    Generate a complete document as a JSON object with this exact structure:
    {{
      "title": "Document Title",
      "doc_type": "{doc_type}",
      "summary": "A 1-2 sentence summary of this document",
      "tags": ["tag1", "tag2"],
      "sections": [
        {{"title": "Section Title", "content": "Markdown content..."}},
        {{"title": "Another Section", "content": "More markdown..."}}
      ],
      "linked_entities": [
        {{"id": "ABB-CORE-001", "name": "Prompt Engineering", "label": "Pattern"}},
        {{"id": "aws-bedrock", "name": "AWS Bedrock", "label": "Technology"}}
      ],
      "suggested_patterns": [
        {{"name": "Pattern Name", "type": "ABB", "description": "Why this pattern is needed"}}
      ]
    }}

    Requirements:
    - Title should be concise and descriptive
    - Summary should capture the document's purpose in 1-2 sentences
    - Tags should include relevant cross-cutting labels (3-6 tags)
    - Sections should be well-organized with substantive markdown content
    - Reference existing catalog items by ID where relevant
    - Include Mermaid diagrams where visual representation helps
    - For ADRs: include Status, Context, Decision, Consequences sections
    - For guides: include clear step-by-step instructions
    - For references: include comprehensive specifications and tables
    - For overviews: include executive summary, scope, key points
    - Aim for 4-8 sections with meaningful content (not thin placeholders)
    - linked_entities: Reference existing catalog items that this document discusses or relates to.
      Use EXACT IDs from the catalog context above. Set label to "Pattern" for AB/ABB/SBB items,
      "Technology" for technology items, or "PBC" for business capabilities. Include 2-8 entities.
    - suggested_patterns: If the document topic reveals patterns that SHOULD exist in the catalog
      but DON'T, suggest them here. Use type "ABB" for vendor-neutral capabilities or "SBB" for
      vendor-specific implementations. Only suggest genuinely missing patterns — do NOT repeat
      existing catalog items. Can be empty if no gaps are identified.

    Return ONLY the JSON object, no additional text or explanations.

  judge: |
    You are a quality reviewer for enterprise architecture documents.
    Score this draft on 5 dimensions (1-10 scale):

    ## User's Original Request
    {prompt}

    ## Generated Draft
    {draft_json}

    ## Catalog Context
    {catalog_context}

    ## Scoring Dimensions
    1. **relevance**: Does the document address the user's request accurately?
    2. **completeness**: Are all necessary sections present with sufficient depth?
    3. **catalog_usage**: Does it reference existing catalog items (patterns, technologies) where appropriate?
    4. **structure**: Is the document well-organized with clear headings, logical flow?
    5. **quality**: Is the writing clear, professional, with good markdown formatting?

    Return a JSON object:
    {{
      "scores": {{
        "relevance": <1-10>,
        "completeness": <1-10>,
        "catalog_usage": <1-10>,
        "structure": <1-10>,
        "quality": <1-10>
      }},
      "overall": <average score>,
      "pass": <true if all scores >= 7>,
      "critiques": [
        {{"dimension": "<name>", "score": <1-10>, "issue": "<what's wrong>", "suggestion": "<how to fix>"}}
      ]
    }}

    Only include critiques for dimensions scoring below 7.
    Return ONLY the JSON object.

  critic: |
    You are a document refinement specialist. Fix the quality issues identified in the critiques
    while preserving all content that was not criticized.

    ## User's Original Request
    {prompt}

    ## Current Draft
    {draft_json}

    ## Catalog Context
    {catalog_context}

    ## Quality Review Critiques (fix these)
    {critiques_json}

    ## Instructions
    Return the COMPLETE corrected document as a JSON object with the same structure:
    {{
      "title": "...",
      "doc_type": "...",
      "summary": "...",
      "tags": [...],
      "sections": [{{"title": "...", "content": "..."}}],
      "linked_entities": [{{"id": "...", "name": "...", "label": "Pattern|Technology|PBC"}}],
      "suggested_patterns": [{{"name": "...", "type": "ABB|SBB", "description": "..."}}]
    }}

    Requirements:
    - Fix ONLY the areas identified in the critiques
    - Preserve all sections and content that were not criticized
    - If completeness is lacking, add new sections or expand thin ones
    - If catalog_usage is low, reference more existing catalog items by ID and add to linked_entities
    - If structure is poor, reorganize sections and improve headings
    - If quality is low, improve writing, formatting, and Mermaid diagrams
    - Preserve linked_entities and suggested_patterns, updating them if relevant to critiques
    - Return the COMPLETE document, not just changed parts

    Return ONLY the JSON object.

  discuss: |
    You are helping the user refine a document through conversation.

    ## Current Draft
    {draft_json}

    ## Catalog Context
    {catalog_context}

    ## Conversation History
    {conversation_history}

    ## User's Message
    {message}

    ## Instructions
    Respond helpfully to the user's message about their document. You may:
    - Answer questions about the document
    - Suggest improvements
    - Explain choices that were made
    - Discuss architectural decisions

    If the user asks for changes to the document (add sections, modify content, change title, etc.),
    make those changes and include the updated document after a separator.

    Response format:
    1. Write your conversational response in markdown
    2. If you modified the document, append exactly this separator on its own line:
       ---DRAFT_UPDATE---
    3. Then append the COMPLETE updated document JSON with this structure:
       {{
         "title": "...", "doc_type": "...", "summary": "...", "tags": [...],
         "sections": [{{"title": "...", "content": "..."}}],
         "linked_entities": [{{"id": "...", "name": "...", "label": "Pattern|Technology|PBC"}}],
         "suggested_patterns": [{{"name": "...", "type": "ABB|SBB", "description": "..."}}]
       }}

    If no document changes are needed, just respond with the conversational text — no separator or JSON.

    IMPORTANT: When including the JSON update, include the ENTIRE document (all sections, linked_entities,
    suggested_patterns), not just the changed parts. The JSON must be valid and complete.
