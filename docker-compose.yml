services:
  neo4j:
    image: neo4j:5-community
    container_name: pattern-neo4j
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: neo4j/patternmanager2026
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_memory_pagecache_size: 256M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: azaddjan/aipatternmanager-backend:0.9.0
    container_name: pattern-api
    expose:
      - "8000"
    environment:
      # --- Database ---
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: patternmanager2026
      # --- LLM Provider API Keys (from host env) ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # --- Ollama ---
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # --- AWS Bedrock ---
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE:-}
      # --- Auth ---
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@patternmanager.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # --- LiteLLM Gateway ---
      LITELLM_GATEWAY_URL: ${LITELLM_GATEWAY_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      # --- Defaults ---
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-anthropic}
    volumes:
      - templates:/app/templates
      - backups:/app/backups
      - uploads:/app/uploads
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    image: azaddjan/aipatternmanager-frontend:0.9.0
    container_name: pattern-ui
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  templates:
  backups:
  uploads:
